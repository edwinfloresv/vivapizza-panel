<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ventas · Viva Pizza Armenia</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 2rem; width: 100%; max-width: 620px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 18px; font-weight: 600; margin-bottom: 1.5rem; color: #111; }
    .seccion-titulo { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 10px; }
    .bloque { border: 1px solid #eee; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .bloque.a { border-left: 3px solid #111; }
    .bloque.b { border-left: 3px solid #f59e0b; }
    .bloque.b input[type="date"] { background: #fefce8; color: #92400e; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    .hint { font-size: 11px; color: #aaa; margin-top: 8px; }
    input[type="date"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    input[type="date"]:focus { border-color: #888; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.75rem; }
    .accesos { display: flex; gap: 6px; flex-wrap: wrap; }
    .accesos button { font-size: 12px; padding: 4px 12px; border: 1px solid #ddd; border-radius: 20px; background: #fff; cursor: pointer; color: #333; }
    .accesos button:hover { background: #f0f0f0; }
    .btn-consultar { width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin: 1.25rem 0; }
    .btn-consultar:hover { background: #333; }
    .btn-consultar:disabled { background: #aaa; cursor: not-allowed; }
    .resultados { display: none; }
    .comparacion { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
    .res-bloque { border-radius: 10px; padding: 1rem 1.25rem; background: #f9f9f9; }
    .res-bloque .etiqueta { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .res-bloque.a .etiqueta { color: #111; }
    .res-bloque.b .etiqueta { color: #d97706; }
    .res-bloque .periodo { font-size: 12px; color: #888; margin-bottom: 6px; }
    .res-bloque .total { font-size: 26px; font-weight: 600; color: #111; }
    .diferencia { border-radius: 10px; padding: 1rem 1.25rem; background: #f0fdf4; border: 1px solid #bbf7d0; text-align: center; }
    .diferencia.negativa { background: #fef2f2; border-color: #fecaca; }
    .diferencia .dif-label { font-size: 12px; color: #666; margin-bottom: 4px; }
    .diferencia .dif-valor { font-size: 22px; font-weight: 600; color: #16a34a; }
    .diferencia.negativa .dif-valor { color: #dc2626; }
    .diferencia .dif-pct { font-size: 13px; color: #16a34a; margin-top: 2px; }
    .diferencia.negativa .dif-pct { color: #dc2626; }
    .estado { font-size: 13px; color: #888; margin-top: 0.75rem; min-height: 18px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍕 Ventas · Viva Pizza Armenia</h1>

    <div class="bloque a">
      <div class="seccion-titulo">Período A</div>
      <div class="grid">
        <div><label>Desde</label><input type="date" id="a-from" oninput="sincronizarB()" /></div>
        <div><label>Hasta</label><input type="date" id="a-to" oninput="sincronizarB()" /></div>
      </div>
      <div class="accesos">
        <button onclick="setRapido('hoy')">Hoy</button>
        <button onclick="setRapido('ayer')">Ayer</button>
        <button onclick="setRapido('semana')">Esta semana</button>
        <button onclick="setRapido('mes')">Este mes</button>
      </div>
    </div>

    <div class="bloque b">
      <div class="seccion-titulo">Período B — mismo rango, año anterior</div>
      <div class="grid">
        <div><label>Desde</label><input type="date" id="b-from" /></div>
        <div><label>Hasta</label><input type="date" id="b-to" /></div>
      </div>
      <p class="hint">Se actualiza automáticamente al cambiar el período A. También puedes editarlo manualmente.</p>
    </div>

    <button class="btn-consultar" id="btn-consultar" onclick="consultar()">Comparar períodos</button>

    <div class="resultados" id="resultados">
      <div class="comparacion">
        <div class="res-bloque a">
          <div class="etiqueta">Período A</div>
          <div class="periodo" id="a-periodo"></div>
          <div class="total" id="a-total"></div>
        </div>
        <div class="res-bloque b">
          <div class="etiqueta">Período B</div>
          <div class="periodo" id="b-periodo"></div>
          <div class="total" id="b-total"></div>
        </div>
      </div>
      <div class="diferencia" id="dif-bloque">
        <div class="dif-label" id="dif-label"></div>
        <div class="dif-valor" id="dif-valor"></div>
        <div class="dif-pct" id="dif-pct"></div>
      </div>
    </div>

    <div class="estado" id="estado"></div>
  </div>

  <script>
    const PROXY = 'https://vivapizza-proxy.onrender.com';
    const fmt = n => new Intl.NumberFormat('es-SV', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(n);
    const fmtDate = s => new Date(s + 'T12:00:00').toLocaleDateString('es-SV', { day: 'numeric', month: 'short', year: 'numeric' });
    const toISO = d => d.toISOString().slice(0, 10);

    function addDays(iso, n) { const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() + n); return toISO(d); }
    function restarAnio(iso) { const d = new Date(iso + 'T12:00:00'); d.setFullYear(d.getFullYear() - 1); return toISO(d); }
    function hoy() { return toISO(new Date()); }
    function ayer() { const d = new Date(); d.setDate(d.getDate() - 1); return toISO(d); }
    function inicioSemana() { const d = new Date(); d.setDate(d.getDate() - d.getDay()); return toISO(d); }
    function inicioMes() { const d = new Date(); d.setDate(1); return toISO(d); }

    function sincronizarB() {
      const aFrom = document.getElementById('a-from').value;
      const aTo   = document.getElementById('a-to').value;
      if (aFrom) document.getElementById('b-from').value = restarAnio(aFrom);
      if (aTo)   document.getElementById('b-to').value   = restarAnio(aTo);
    }

    function setRapido(tipo) {
      const f = document.getElementById('a-from');
      const t = document.getElementById('a-to');
      if (tipo === 'hoy')    { f.value = hoy(); t.value = hoy(); }
      if (tipo === 'ayer')   { f.value = ayer(); t.value = ayer(); }
      if (tipo === 'semana') { f.value = inicioSemana(); t.value = hoy(); }
      if (tipo === 'mes')    { f.value = inicioMes(); t.value = hoy(); }
      sincronizarB();
    }

    // Defaults: A = ayer, B = mismo día del año anterior
    setRapido('ayer');

    async function fetchTotal(from, to) {
      const toApi = addDays(to, 1);
      const res = await fetch(`${PROXY}/orden-trabajo/total?from=${from}&to=${toApi}`);
      if (!res.ok) throw new Error('Error ' + res.status);
      const data = await res.json();
      return data.total;
    }

    async function consultar() {
      const aFrom = document.getElementById('a-from').value;
      const aTo   = document.getElementById('a-to').value;
      const bFrom = document.getElementById('b-from').value;
      const bTo   = document.getElementById('b-to').value;
      const estado = document.getElementById('estado');
      const resultados = document.getElementById('resultados');

      if (!aFrom || !aTo || !bFrom || !bTo) { estado.textContent = 'Completa todos los campos de fecha.'; return; }
      if (aFrom > aTo) { estado.textContent = 'El período A tiene fechas inválidas.'; return; }
      if (bFrom > bTo) { estado.textContent = 'El período B tiene fechas inválidas.'; return; }

      estado.textContent = 'Consultando...';
      resultados.style.display = 'none';
      document.getElementById('btn-consultar').disabled = true;

      try {
        const [totalA, totalB] = await Promise.all([fetchTotal(aFrom, aTo), fetchTotal(bFrom, bTo)]);

        document.getElementById('a-periodo').textContent = aFrom === aTo ? fmtDate(aFrom) : `${fmtDate(aFrom)} – ${fmtDate(aTo)}`;
        document.getElementById('b-periodo').textContent = bFrom === bTo ? fmtDate(bFrom) : `${fmtDate(bFrom)} – ${fmtDate(bTo)}`;
        document.getElementById('a-total').textContent = fmt(totalA);
        document.getElementById('b-total').textContent = fmt(totalB);

        const diff = totalA - totalB;
        const pct = totalB !== 0 ? ((diff / totalB) * 100).toFixed(1) : null;
        const difBloque = document.getElementById('dif-bloque');
        difBloque.className = 'diferencia' + (diff < 0 ? ' negativa' : '');
        document.getElementById('dif-label').textContent = diff >= 0 ? 'Período A mayor que B en' : 'Período A menor que B en';
        document.getElementById('dif-valor').textContent = fmt(Math.abs(diff));
        document.getElementById('dif-pct').textContent = pct !== null ? `${diff >= 0 ? '▲' : '▼'} ${Math.abs(pct)}% respecto al período B` : '';

        resultados.style.display = 'block';
        estado.textContent = '';
      } catch (e) {
        estado.textContent = 'No se pudo conectar. Si es la primera consulta del día, espera 1 minuto e intenta de nuevo.';
      } finally {
        document.getElementById('btn-consultar').disabled = false;
      }
    }
  </script>
</body>
</html>
